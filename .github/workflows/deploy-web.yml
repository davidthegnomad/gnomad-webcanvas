# Deploy documentation site + playable web app to GitHub Pages.
# Site root: docs landing (index.html) · Web app: /app/
name: Deploy Web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install, test, and export docs
        run: |
          npm ci
          npm run test
          npm run docs:export

      - name: Build web app
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/app/
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          cp README.html README.txt CHANGELOG.html CHANGELOG.txt HUMAN.html HUMAN.txt _site/ 2>/dev/null || true
          cp -r public/get _site/get 2>/dev/null || true
          cp -r dist _site/app

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
