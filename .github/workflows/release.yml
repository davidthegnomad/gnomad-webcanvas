name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Gnomad Studio Webcanvas ${{ github.ref_name }}
          releaseBody: |
            **Public beta** — desktop builds for Gnomad Studio Webcanvas.

            Web app: https://davidthegnomad.github.io/gnomad-webcanvas/
            Get page: https://davidthegnomad.github.io/gnomad-webcanvas/get/

            | Platform | Artifact |
            |----------|----------|
            | Linux | `.rpm` (Fedora/RHEL), `.deb` (Ubuntu/Debian), `.AppImage` |
            | Windows | `.msi`, `.exe` (NSIS) |
            | macOS (Apple Silicon) | `.dmg`, `.app` |
            | macOS (Intel) | `.dmg`, `.app` |

            Feedback: david@gnomad.studio
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
