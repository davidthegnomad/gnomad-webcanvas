name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Windows Alpha — only `v*-alpha*` tags (does not rebuild Linux/macOS).
  build-windows-alpha:
    if: contains(github.ref_name, 'alpha')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_BODY_EOF'
            node scripts/release-notes.mjs
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (Windows Alpha)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Gnomad Webcanvas ${{ github.ref_name }} (Windows Alpha)
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.windows.conf.json

      - name: SHA256 checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name '*.exe' -o -name '*.msi' \) -print0 \
            | sort -z | xargs -0 sha256sum > "SHA256SUMS-x86_64-pc-windows-msvc.txt" || true
          if [[ -s "SHA256SUMS-x86_64-pc-windows-msvc.txt" ]]; then
            cat "SHA256SUMS-x86_64-pc-windows-msvc.txt"
          fi

      - name: Upload checksum artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: checksums-x86_64-pc-windows-msvc
          path: src-tauri/target/release/bundle/SHA256SUMS-x86_64-pc-windows-msvc.txt
          if-no-files-found: ignore

  # Beta / stable — Linux + macOS only (Windows ships on alpha tags until promoted).
  build-release:
    if: "!contains(github.ref_name, 'alpha')"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauriArgs: '--config src-tauri/tauri.linux.conf.json'
            noStrip: '1'
          - platform: macos-latest
            target: aarch64-apple-darwin
            tauriArgs: '--config src-tauri/tauri.macos.conf.json'
            noStrip: ''
          - platform: macos-latest
            target: x86_64-apple-darwin
            tauriArgs: '--config src-tauri/tauri.macos.conf.json'
            noStrip: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_BODY_EOF'
            node scripts/release-notes.mjs
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NO_STRIP: ${{ matrix.noStrip }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.noStrip }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Gnomad Webcanvas ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.tauriArgs }}

      - name: SHA256 checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.appimage' -o -name '*.dmg' -o -name '*.exe' -o -name '*.msi' \) -print0 \
            | sort -z | xargs -0 sha256sum > "SHA256SUMS-${{ matrix.target }}.txt" || true
          if [[ -s "SHA256SUMS-${{ matrix.target }}.txt" ]]; then
            cat "SHA256SUMS-${{ matrix.target }}.txt"
          fi

      - name: Upload checksum artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.target }}
          path: src-tauri/target/release/bundle/SHA256SUMS-${{ matrix.target }}.txt
          if-no-files-found: ignore
